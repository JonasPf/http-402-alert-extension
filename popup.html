<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTTP 402 Alert</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- Ethereum Wallet Section -->
    <div class="wallet-section">
      <h2>💰 Ethereum Wallet</h2>
      <div class="wallet-info">
        <div class="address-label">Address:</div>
        <div id="wallet-address" class="wallet-address">Loading...</div>
        <button id="copy-address-btn" class="copy-btn" title="Copy address">📋</button>
      </div>
      <button id="reveal-key-btn" class="reveal-btn">Reveal Private Key</button>
      <div id="private-key-section" class="private-key-section" style="display: none;">
        <div class="warning">⚠️ Never share your private key!</div>
        <div id="private-key" class="private-key"></div>
        <button id="copy-key-btn" class="copy-btn">Copy Private Key</button>
      </div>
    </div>
    
    <div class="divider"></div>
    
    <h1>⚠️ HTTP 402 Payment Required</h1>
    <p class="subtitle">Recent 402 status code detections</p>
    
    <div id="events-container">
      <p class="no-events">No 402 responses detected yet.</p>
    </div>
    
    <button id="clear-btn">Clear Notifications</button>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
